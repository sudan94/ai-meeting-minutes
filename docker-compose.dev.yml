version: "3.9"

# Standalone dev compose — run with:
#   docker compose -f docker-compose.dev.yml up --build
#
# backend  — bind-mounted source; uvicorn --reload on every .py save
# frontend — node:20-alpine dev server with HMR; no nginx/production build

services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_SERVER: db
    volumes:
      - ./backend:/app
      - recordings:/app/recordings
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      # Mount only the directories the watcher needs — NOT the whole tree.
      # Mounting ./frontend:/app exposes node_modules to inotify and exhausts
      # the kernel watch-descriptor limit inside the Docker VM (ENOMEM).
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/meeting
      # Bind to all interfaces so the port mapping works from outside the container
      - HOST=0.0.0.0
      # CRA 5 / webpack 5 uses watchpack. Pass an explicit ms interval rather than
      # "true" so Number("true")=NaN fallback doesn't silently disable polling.
      - WATCHPACK_POLLING=1000
      # webpack-dev-server's own chokidar watcher also needs polling on Docker/Windows
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WDS_SOCKET_PORT=3000
    depends_on:
      - backend

volumes:
  postgres_data:
  recordings:
  frontend_node_modules:
